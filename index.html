<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raidy - Storage Infrastructure Simulator</title>
    <meta name="description" content="Browser-based simulator for modern storage infrastructure (RAID, ZFS, vSAN, S2D, Nutanix, Dell, NetApp, Ceph, Synology)" />
    <meta name="theme-color" content="#0ea5e9" />

    <!-- Favicon -->
    <link rel="icon" href="/raidy/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/png" sizes="32x32" href="/raidy/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/raidy/favicon-16x16.png" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/raidy/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Raidy" />

    <!-- Web Manifest -->
    <link rel="manifest" href="/raidy/site.webmanifest" />

    <!-- Content Security Policy for GitHub Pages (limited - no frame-ancestors support) -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
