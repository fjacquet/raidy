# raidy — supply-chain → audit → OSV → typecheck → lint → test → build →
# bundle-size → SBOM → deploy to fjacquet.github.io/raidy/
name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
    tags: ['v*']
  pull_request:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Check supply chain (telemetry denylist)
        run: node scripts/check-supply-chain.mjs

      - name: Install dependencies
        run: npm ci

      - name: npm audit (all deps, LOW+)
        # Advisory: npm audit hard-fails on transitive CVEs that have no per-PR
        # Dependabot fix. OSV-Scanner (below) is already non-blocking — keep this
        # consistent so dependency PRs aren't red-lit by unrelated tree CVEs.
        continue-on-error: true
        run: npm audit --audit-level=low

      - name: OSV-Scanner (lockfile)
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --config=./osv-scanner.toml
            --lockfile=./package-lock.json
            --format=sarif
            --output=osv-results.sarif
        continue-on-error: true

      - name: Upload OSV SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner
        continue-on-error: true

      - name: Gate on OSV LOW+
        run: |
          if [ ! -f osv-results.sarif ]; then
            echo "::warning::OSV produced no SARIF — treating as clean."
            exit 0
          fi
          low_plus=$(jq '[.runs[].results[]?
            | select(
                ([.properties.severity? // ""
                  , .level? // ""] | join(" ") | ascii_downcase) as $sev
                | $sev | test("(low|moderate|high|critical|warning|error)")
              )] | length' osv-results.sarif)
          echo "OSV LOW+ findings: $low_plus"
          if [ "$low_plus" -gt 0 ]; then
            echo "::error::OSV found $low_plus LOW+ advisory(ies)"
            exit 1
          fi

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: npm run check:bundle-size

      - name: Generate CycloneDX SBOM (prod deps)
        run: |
          npx --yes @cyclonedx/cyclonedx-npm@latest \
            --omit dev \
            --output-format JSON \
            --output-file sbom.cdx.json
          components=$(jq '.components | length' sbom.cdx.json)
          echo "SBOM components: $components"
          if [ "$components" -lt 1 ]; then
            echo "::error::SBOM has zero components — aborting"
            exit 1
          fi

      - name: Upload SBOM artefact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          if-no-files-found: error
          retention-days: 90

      - name: Attach SBOM to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --title "$tag" \
              --notes "See CHANGELOG.md for release notes." \
              --verify-tag
          fi
          gh release upload "$tag" sbom.cdx.json --clobber

      - name: Setup Pages
        if: XXX && github.event_name != 'pull_request'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true

      - name: Upload artifact
        if: XXX && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: './dist'

  deploy:
    if: XXX && github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
